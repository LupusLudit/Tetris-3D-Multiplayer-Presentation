<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris 3D Multiplayer Presentation</title>

    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <header class="header">
        <div class="lang-switch">
            <button onclick="setLanguage('en')">EN</button>
            <button onclick="setLanguage('cz')">CZ</button>
        </div>

        <h1 class="title" data-key="title"></h1>
    </header>

    <main>

        <section class="video-section">
            <h2 data-key="demo"></h2>
            <div class="video-container">
                <iframe 
                    src="https://drive.google.com/file/d/1qkwBfgIq5ZmxbuyZBzAqbrKEcvN1N0XM/preview"
                    width="100%" 
                    height="100%" 
                    allow="autoplay"
                >
                </iframe>
            </div>
        </section>

        <section class="content">
            <h2 data-key="about"></h2>
            <p data-key="about_text_1"></p>
            <p data-key="about_text_2"></p>
            <p data-key="about_text_3"></p>
            <p data-key="about_text_4"></p>
        </section>

        <section class="content">
            <h2 data-key="regimes"></h2>
            <p data-key="regimes_text_1"></p>
            <h3 data-key="regime_category_1"></h3>
            <ul>
                <li data-key="regime_1"></li>
                <li data-key="regime_2"></li>
                <li data-key="regime_3"></li>
                <li data-key="regime_4"></li>
                <li data-key="regime_5"></li>
            </ul>
            <h3 data-key="regime_category_2"></h3>
            <ul>
                <li data-key="regime_6"></li>
            </ul>
        </section>

        <section class="content">
            <h2 data-key="settings"></h2>
            <p data-key="settings_text"></p>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th data-key="settings_col_action"></th>
                            <th data-key="settings_col_key"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td data-key="setting_move"></td><td>↑ / ↓ / ← / →</td></tr>
                        <tr><td data-key="setting_rotate_ccw"></td><td>Q</td></tr>
                        <tr><td data-key="setting_rotate_cw"></td><td>E</td></tr>
                        <tr><td data-key="setting_switch_x"></td><td>A</td></tr>
                        <tr><td data-key="setting_switch_y"></td><td>S</td></tr>
                        <tr><td data-key="setting_switch_z"></td><td>D</td></tr>
                        <tr><td data-key="setting_soft_drop"></td><td>Shift</td></tr>
                        <tr><td data-key="setting_hard_drop"></td><td>Space</td></tr>
                        <tr><td data-key="setting_hold"></td><td>C</td></tr>
                        <tr><td data-key="setting_rotate_camera_left"></td><td>K</td></tr>
                        <tr><td data-key="setting_rotate_camera_right"></td><td>L</td></tr>
                        <tr><td data-key="setting_pause"></td><td>Esc</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section class="content">
            <h2 data-key="technologies"></h2>
            <p data-key="technologies_text"></p>
        </section>

        <section class="content">
            <h2 data-key="future"></h2>
            <p data-key="future_text"></p>
        </section>

    </main>

    <footer>

        <div class="footer-info">
            <p>© 2026 Lupusludit</p>
            <p><a href="mailto:michal.bielina@centrum.cz">michal.bielina@centrum.cz</a></p>
        </div>

        <div">
            <a href="https://github.com/LupusLudit" class="fa fa-github"></a>
            <a href="https://www.linkedin.com/in/michal-bielina-65732438a" class="fa fa-linkedin"></a>
        </div>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
